wtf:
  colors:
    border:
      focusable: darkslateblue
      focused: orange
      normal: gray
  grid:
    columns: [-1, -1]
    rows: [-1, -1]
  refreshInterval: 1s
  mods:
    # Local Git Repos - auto-discovered from ~/dev
    repos:
      args: []
      cmd: "/Users/channing/dotfiles/bin/wtf-repos"
      enabled: true
      pty: true
      position:
        top: 0
        left: 0
        height: 1
        width: 1
      refreshInterval: 30s
      title: "Local Repos"
      type: cmdrunner

    # GitHub pull request build status
    prBuilds:
      args: []
      cmd: "/Users/channing/dotfiles/bin/gh-pr-builds"
      enabled: true
      pty: true
      position:
        top: 1
        left: 0
        height: 1
        width: 1
      refreshInterval: 30s
      title: "PR Builds"
      type: cmdrunner

    # Service versions across environments
    serviceVersions:
      args: []
      cmd: "/Users/channing/dev/patchwork/repos/kmono/tools/service-versions.sh"
      enabled: true
      pty: true
      position:
        top: 0
        left: 1
        height: 1
        width: 1
      refreshInterval: 30s
      title: "Service Versions"
      type: cmdrunner

    # Deployment status
    deployStatus:
      args: []
      cmd: "/Users/channing/dev/patchwork/repos/kmono/tools/deploy-status.sh"
      enabled: true
      pty: true
      position:
        top: 1
        left: 1
        height: 1
        width: 1
      refreshInterval: 30s
      title: "Deploy status"
      type: cmdrunner
